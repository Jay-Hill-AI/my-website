// ---- helpers ----
function fmtPace(p){ if(p==null) return "—"; const m=Math.floor(p); let s=Math.round((p-m)*60); let mm=m; if(s===60){mm++;s=0;} return mm+":"+String(s).padStart(2,"0"); }
function cumulative(arr){ let t=0; return arr.map(v=>t+=v); }

let activeYears = new Set(YEARS);
function filtered(){ return MONTHLY.filter(d=>activeYears.has(d.year)); }

function render(){
  const data = filtered();
  const totalDist = Math.round(data.reduce((a,d)=>a+d.dist,0));
  const totalRuns = data.reduce((a,d)=>a+d.runs,0);
  const totalElev = data.reduce((a,d)=>a+d.elev,0);
  document.getElementById("kpi-dist").textContent = totalDist.toLocaleString()+" km";
  document.getElementById("kpi-runs").textContent = totalRuns;
  document.getElementById("kpi-elev").textContent = (totalElev/1000).toFixed(1)+"k m";
  const evspans=document.querySelectorAll(".everest");
  if(evspans[0]) evspans[0].textContent = "≈ "+(totalElev/8849).toFixed(1)+" × Everest";

  drawBars("c-vol", data.map(d=>d.dist), data.map(d=>d.ym), "km", "#E8743B");
  drawBars("c-runs", data.map(d=>d.runs), data.map(d=>d.ym), "runs", "#2E86AB");
  drawBars("c-elev", data.map(d=>d.elev), data.map(d=>d.ym), "m", "#27AE60");
  drawBars("c-avgdist", data.map(d=>d.avgdist), data.map(d=>d.ym), "km/run", "#8E44AD");
  drawLine("c-pace", data.map(d=>d.pace), data.map(d=>d.ym), "min/km", "#E8743B", true);
  drawLine("c-hr", data.map(d=>d.hr), data.map(d=>d.ym), "bpm", "#C0392B", false);
  drawCumLine("c-cumdist", cumulative(data.map(d=>d.dist)), data.map(d=>d.ym), "km", "#E8743B");
  drawCumLine("c-cumelev", cumulative(data.map(d=>d.elev)), data.map(d=>d.ym), "m", "#2E86AB");
  drawScatter("c-scatter");
  drawBuckets("c-buckets");
}

const TICK = "var(--muted)";
function svgWrap(w,h){ return `<svg viewBox="0 0 ${w} ${h}" width="100%" preserveAspectRatio="xMidYMid meet" font-family="var(--mono)">`; }

function drawBars(id, vals, labels, unit, color){
  const el=document.getElementById(id);
  const W=720,H=240,padL=42,padB=46,padT=12,padR=8;
  const max=Math.max(...vals.filter(v=>v!=null),1);
  const n=vals.length, bw=(W-padL-padR)/Math.max(n,1);
  let s=svgWrap(W,H);
  for(let g=0;g<=4;g++){ const y=padT+(H-padT-padB)*g/4; const v=Math.round(max*(1-g/4));
    s+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--grid)" stroke-width="1"/>`;
    s+=`<text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="9" fill="${TICK}">${v}</text>`; }
  vals.forEach((v,i)=>{ if(v==null)return; const h=(H-padT-padB)*v/max; const x=padL+i*bw+bw*0.12; const y=H-padB-h;
    s+=`<rect x="${x}" y="${y}" width="${bw*0.76}" height="${h}" fill="${color}" rx="1.5"><title>${labels[i]}: ${v} ${unit}</title></rect>`; });
  labels.forEach((l,i)=>{ if(n<=24 || i%2===0){ const x=padL+i*bw+bw/2;
    s+=`<text x="${x}" y="${H-padB+12}" text-anchor="end" font-size="8" fill="${TICK}" transform="rotate(-55 ${x} ${H-padB+12})">${l.slice(2)}</text>`; }});
  s+="</svg>"; el.innerHTML=s;
}
function drawLine(id, vals, labels, unit, color, invert){
  const el=document.getElementById(id);
  const W=720,H=240,padL=44,padB=46,padT=12,padR=8;
  const clean=vals.filter(v=>v!=null);
  let max=Math.max(...clean), min=Math.min(...clean); const pad=(max-min)*0.15||1; max+=pad; min-=pad;
  const n=vals.length; const xs=i=>padL+(W-padL-padR)*(n<=1?0.5:i/(n-1));
  const ys=v=>padT+(H-padT-padB)*(1-(v-min)/(max-min));
  let s=svgWrap(W,H);
  for(let g=0;g<=4;g++){ const y=padT+(H-padT-padB)*g/4; const v=(max-(max-min)*g/4);
    s+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--grid)" stroke-width="1"/>`;
    s+=`<text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="9" fill="${TICK}">${unit==="min/km"?fmtPace(v):Math.round(v)}</text>`; }
  let dd="",started=false;
  vals.forEach((v,i)=>{ if(v==null){started=false;return;} const cmd=started?"L":"M"; dd+=`${cmd}${xs(i)},${ys(v)} `; started=true; });
  s+=`<path d="${dd}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linejoin="round"/>`;
  vals.forEach((v,i)=>{ if(v==null)return; s+=`<circle cx="${xs(i)}" cy="${ys(v)}" r="2.8" fill="${color}"><title>${labels[i]}: ${unit==="min/km"?fmtPace(v)+"/km":v+" "+unit}</title></circle>`; });
  if(invert){ s+=`<text x="${W-padR}" y="${padT+10}" text-anchor="end" font-size="8" fill="${TICK}" font-style="italic">higher = slower</text>`; }
  labels.forEach((l,i)=>{ if(n<=24 || i%2===0){ s+=`<text x="${xs(i)}" y="${H-padB+12}" text-anchor="end" font-size="8" fill="${TICK}" transform="rotate(-55 ${xs(i)} ${H-padB+12})">${l.slice(2)}</text>`; }});
  s+="</svg>"; el.innerHTML=s;
}
function drawCumLine(id, vals, labels, unit, color){
  const el=document.getElementById(id);
  const W=720,H=240,padL=50,padB=46,padT=12,padR=8;
  const max=Math.max(...vals,1); const n=vals.length;
  const xs=i=>padL+(W-padL-padR)*(n<=1?0.5:i/(n-1)); const ys=v=>padT+(H-padT-padB)*(1-v/max);
  let s=svgWrap(W,H);
  for(let g=0;g<=4;g++){ const y=padT+(H-padT-padB)*g/4; const v=Math.round(max*(1-g/4));
    s+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--grid)" stroke-width="1"/>`;
    s+=`<text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="9" fill="${TICK}">${v.toLocaleString()}</text>`; }
  let area=`M${xs(0)},${H-padB} `, line="";
  vals.forEach((v,i)=>{ const cmd=i===0?"M":"L"; line+=`${cmd}${xs(i)},${ys(v)} `; area+=`L${xs(i)},${ys(v)} `; });
  area+=`L${xs(n-1)},${H-padB} Z`;
  s+=`<path d="${area}" fill="${color}" opacity="0.12"/>`;
  s+=`<path d="${line}" fill="none" stroke="${color}" stroke-width="2.4"/>`;
  vals.forEach((v,i)=>{ s+=`<circle cx="${xs(i)}" cy="${ys(v)}" r="2.4" fill="${color}"><title>${labels[i]}: ${Math.round(v).toLocaleString()} ${unit}</title></circle>`; });
  labels.forEach((l,i)=>{ if(n<=24 || i%2===0){ s+=`<text x="${xs(i)}" y="${H-padB+12}" text-anchor="end" font-size="8" fill="${TICK}" transform="rotate(-55 ${xs(i)} ${H-padB+12})">${l.slice(2)}</text>`; }});
  s+="</svg>"; el.innerHTML=s;
}
function drawScatter(id){
  const el=document.getElementById(id);
  const pts=SCATTER.filter(p=>activeYears.has(p.year));
  const W=720,H=300,padL=44,padB=42,padT=14,padR=12;
  const xmin=120,xmax=185,ymin=4,ymax=7.5;
  const xs=v=>padL+(W-padL-padR)*(v-xmin)/(xmax-xmin);
  const ys=v=>padT+(H-padT-padB)*(1-(v-ymin)/(ymax-ymin));
  const cmap={2021:"#94a3b8",2022:"#94a3b8",2023:"#64748b",2024:"#2E86AB",2025:"#E8743B",2026:"#C0392B"};
  let s=svgWrap(W,H);
  for(let v=125;v<=185;v+=10){ s+=`<line x1="${xs(v)}" y1="${padT}" x2="${xs(v)}" y2="${H-padB}" stroke="var(--grid)"/>`;
    s+=`<text x="${xs(v)}" y="${H-padB+14}" text-anchor="middle" font-size="9" fill="${TICK}">${v}</text>`; }
  for(let v=4;v<=7;v++){ s+=`<line x1="${padL}" y1="${ys(v)}" x2="${W-padR}" y2="${ys(v)}" stroke="var(--grid)"/>`;
    s+=`<text x="${padL-6}" y="${ys(v)+3}" text-anchor="end" font-size="9" fill="${TICK}">${fmtPace(v)}</text>`; }
  pts.forEach(p=>{ s+=`<circle cx="${xs(p.x)}" cy="${ys(p.y)}" r="4" fill="${cmap[p.year]}" opacity="0.78"><title>${p.x} bpm · ${fmtPace(p.y)}/km · ${p.year}</title></circle>`; });
  s+=`<text x="${W/2}" y="${H-4}" text-anchor="middle" font-size="9" fill="${TICK}">Avg HR (bpm)  →</text>`;
  s+="</svg>"; el.innerHTML=s;
}
function drawBuckets(id){
  const el=document.getElementById(id);
  const sel=YEARS.filter(y=>activeYears.has(y));
  const totals=BUCKET_LABELS.map((_,i)=>sel.reduce((a,y)=>a+(BUCKETS[y]?BUCKETS[y][i]:0),0));
  const W=720,H=240,padL=36,padB=40,padT=12,padR=8;
  const max=Math.max(...totals,1); const n=totals.length, bw=(W-padL-padR)/n;
  let s=svgWrap(W,H);
  for(let g=0;g<=4;g++){ const y=padT+(H-padT-padB)*g/4;
    s+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--grid)"/>`;
    s+=`<text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="9" fill="${TICK}">${Math.round(max*(1-g/4))}</text>`; }
  totals.forEach((v,i)=>{ const h=(H-padT-padB)*v/max; const x=padL+i*bw+bw*0.15; const y=H-padB-h;
    s+=`<rect x="${x}" y="${y}" width="${bw*0.7}" height="${h}" fill="#8E44AD" rx="2"><title>${BUCKET_LABELS[i]} km: ${v} runs</title></rect>`;
    s+=`<text x="${x+bw*0.35}" y="${y-4}" text-anchor="middle" font-size="9" fill="var(--ink)">${v}</text>`;
    s+=`<text x="${padL+i*bw+bw/2}" y="${H-padB+14}" text-anchor="middle" font-size="9" fill="${TICK}">${BUCKET_LABELS[i]}</text>`; });
  s+="</svg>"; el.innerHTML=s;
}

function buildChips(){
  const wrap=document.getElementById("chips");
  YEARS.forEach(y=>{ const b=document.createElement("button"); b.className="chip on"; b.dataset.year=y;
    const sparse=(y<=2023); b.innerHTML = y + (sparse?' <span class="dot">·</span>':'');
    b.title = sparse ? "Sparse data — anecdotal" : "";
    b.onclick=()=>{ if(activeYears.has(y)){activeYears.delete(y);b.classList.remove("on");} else {activeYears.add(y);b.classList.add("on");} render(); };
    wrap.appendChild(b); });
  document.getElementById("btn-all").onclick=()=>{ activeYears=new Set(YEARS); document.querySelectorAll(".chip").forEach(c=>c.classList.add("on")); render(); };
  document.getElementById("btn-serious").onclick=()=>{ activeYears=new Set([2024,2025,2026]); document.querySelectorAll(".chip").forEach(c=>{ c.classList.toggle("on", activeYears.has(+c.dataset.year)); }); render(); };
}
